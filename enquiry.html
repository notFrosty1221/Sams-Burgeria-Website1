<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Enquiry | Sams Burgeria</title>

        <meta name="description" content="Send us your burger enquiries, feedback or questions. We are happy to assist you at Burger World.">
        <!-- Mobile friendliness -->
         <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="css/style.css">
    </head>

    <body>

        <header>
            <h1>Enquiry Form</h1>

            <nav>
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="products.html">Products</a>
                <a href="enquiry.html">Enquiry</a>
                <a href="contact.html">Contact</a>

            </nav>
        </header>

        <main>

            <section>
                <h2>Send us an enquiry</h2>
                <p>Please fill in the form below.</p>

                <form>
                    <form id="enquiryForm">

    <label for="enqName">Full Name:</label><br>
    <input type="text" id="enqName" required minlength="3"><br><br>

    <label for="enqEmail">Email Address:</label><br>
    <input type="email" id="enqEmail" required><br><br>

    <label for="enqPhone">Phone Number:</label><br>
    <input type="tel" id="enqPhone" required pattern="[0-9]{10}"><br><br>

    <label for="burgerType">Enquiry Type:</label><br>
    <select id="burgerType" required>
        <option value="">Select an option</option>
        <option>General Question</option>
        <option>Product Enquiry</option>
        <option>Feedback</option>
    </select><br><br>

    <label for="enqMessage">Your Message:</label><br>
    <textarea id="enqMessage" required minlength="5"></textarea><br><br>

    <button type="submit">Send Enquiry</button>

</form>

<p id="enqResponse"></p>
                    </form>
            </section>

        </main>

        <footer>
            <p>Phone: 082 774 1144 | Email: samsburgeria@gmail.com</p>
        </footer>

    </body>
</html>
